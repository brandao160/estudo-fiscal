<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards de Estudo Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --sidebar-bg: rgba(15, 23, 42, 0.95);
            --card-bg: rgba(30, 41, 59, 0.4);
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: rgba(59, 130, 246, 0.1);
            --success-color: #10b981;
            --danger-color: #ef4444;
            --glass-blur: blur(20px);
            --body-bg: radial-gradient(circle at 80% 10%, #1e3a8a, #0f172a 45%, #020617 85%);
            --sidebar-width: 280px;
            --editor-bg: #ffffff;
            --editor-text: #1e293b;
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--body-bg);
            background-attachment: fixed;
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--border-color);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
            padding: 25px 0;
        }

        .sidebar-logo {
            padding: 0 25px 30px;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px;
        }

        .menu-title {
            padding: 10px 15px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .menu-item {
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: 500;
            color: var(--text-muted);
            position: relative;
            overflow: hidden;
        }

        .btn-delete-subject {
            opacity: 0;
            color: var(--danger-color);
            padding: 5px;
            border-radius: 5px;
            transition: all 0.2s;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-item:hover .btn-delete-subject {
            opacity: 1;
        }

        .btn-delete-subject:hover {
            background: rgba(239, 68, 68, 0.1);
            transform: scale(1.1);
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
        }

        .menu-item.active {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-color);
            border-left: 3px solid var(--accent-color);
        }

        .menu-item i { width: 20px; }

        .subject-count {
            font-size: 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 40px 50px;
            max-width: calc(100vw - var(--sidebar-width));
        }

        header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .header-title p { color: var(--text-muted); margin: 5px 0 0; }

        /* --- ACTIONS BAR --- */
        .actions-bar {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .search-wrapper {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-wrapper input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            color: white;
            font-size: 1rem;
        }

        .input-group {
            display: flex;
            gap: 12px;
            flex: 2;
            min-width: 400px;
        }

        select, .input-tema {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            color: white;
            padding: 14px 18px;
            font-family: inherit;
            font-size: 1rem;
        }

        .input-tema { flex: 1; }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            font-size: 0.95rem;
        }

        .btn-primary { background: var(--accent-color); color: white; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-3px); box-shadow: 0 12px 20px -5px rgba(59, 130, 246, 0.5); }
        
        .btn-save { background: var(--success-color); color: white; }
        .btn-save:hover { opacity: 0.9; transform: translateY(-3px); box-shadow: 0 12px 20px -5px rgba(16, 185, 129, 0.5); }

        .btn-add-subject {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px dashed var(--border-color);
            margin-top: 15px;
            padding: 12px;
        }

        /* --- GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 35px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: var(--accent-color);
            background: rgba(30, 41, 59, 0.7);
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.6);
        }

        .card h3 {
            margin: 15px 0 0;
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-color);
        }

        .card-subject {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--accent-color);
            background: rgba(59, 130, 246, 0.15);
            padding: 6px 14px;
            border-radius: 100px;
            display: inline-block;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
        }

        .card-info {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-actions {
            display: flex;
            gap: 12px;
            opacity: 0;
            transform: translateX(10px);
        }

        .card:hover .card-actions { opacity: 1; transform: translateX(0); }

        .btn-icon-card {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: none;
            cursor: pointer;
        }

        .btn-icon-card:hover { background: var(--danger-color); color: white; transform: rotate(10deg); }

        /* --- WORD-STYLE EDITOR --- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 0; /* Full screen feel */
        }

        .overlay.active { display: flex; }

        .editor-modal {
            background: #f8fafc; /* Light Word-like background */
            width: 100%;
            height: 100%;
            max-width: 1100px;
            margin: 20px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.9);
            animation: wordZoom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes wordZoom {
            from { transform: scale(0.9) translateY(40px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .editor-toolbar {
            padding: 20px 40px;
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1e293b;
        }

        .editor-title-area h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            color: #0f172a;
        }

        .editor-body {
            flex: 1;
            padding: 60px 80px;
            overflow-y: auto;
            background: #ffffff;
            display: flex;
            justify-content: center;
        }

        .word-page {
            width: 100%;
            max-width: 800px;
            min-height: 100%;
        }

        .word-textarea {
            width: 100%;
            height: 100%;
            min-height: 600px;
            border: none;
            outline: none;
            font-size: 1.2rem;
            line-height: 1.8;
            color: #334155;
            font-family: 'Inter', sans-serif;
            resize: none;
            background: transparent;
        }

        .editor-footer {
            padding: 20px 40px;
            background: #f1f5f9;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .btn-word-save { background: #0f172a; color: white; border-radius: 10px; }
        .btn-word-save:hover { background: #334155; }

        .btn-word-close { background: transparent; color: #64748b; border: 1px solid #cbd5e1; border-radius: 10px; }
        .btn-word-close:hover { background: #f1f5f9; }

        /* --- UTILS --- */
        .toast {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: var(--success-color);
            color: white;
            padding: 18px 32px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 2000;
            animation: slideLeft 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 700;
        }

        @keyframes slideLeft { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 120px 0;
            color: var(--text-muted);
        }

        .hidden { display: none; }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.2); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(59, 130, 246, 0.4); }

    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <i class="fas fa-graduation-cap"></i>
        <span>CicloEstudo</span>
    </div>

    <div class="sidebar-menu">
        <div class="menu-title">Navegação</div>
        <a href="/" class="menu-item" style="text-decoration: none;">
            <span><i class="fas fa-home"></i> Painel Principal</span>
        </a>

        <div class="menu-title" style="margin-top: 20px;">Minhas Matérias</div>
        <div id="subject-list">
            <!-- Renderizado via JS -->
        </div>
        
        <button class="btn btn-add-subject" onclick="adicionarMateria()">
            <i class="fas fa-plus-circle"></i> Criar Matéria
        </button>
    </div>

    <div class="sidebar-footer">
        <button class="btn btn-save" style="width: 100%;" onclick="salvarParaArquivo()">
            <i class="fas fa-cloud-download-alt"></i> Backup no Arquivo
        </button>
    </div>
</aside>

<main class="main-content">
    <header>
        <div class="header-title">
            <h1 id="current-subject-title">Meus Resumos</h1>
            <p id="stats-text">Organizando seus estudos...</p>
        </div>
    </header>

    <div class="actions-bar">
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Pesquisar em tudo..." oninput="renderizar()">
        </div>

        <div class="input-group">
            <select id="selectMateria">
                <!-- Opções de matérias -->
            </select>
            <input type="text" id="novoTitulo" class="input-tema" placeholder="Título do resumo (ex: Atos Administrativos)">
            <button class="btn btn-primary" onclick="criarCard()">
                <i class="fas fa-pencil-alt"></i> Novo Flashcard
            </button>
        </div>
    </div>

    <div id="grid" class="grid">
        <!-- Cards serão injetados aqui -->
    </div>
</main>

<!-- WORD-STYLE EDITOR MODAL -->
<div id="overlay" class="overlay" onclick="fecharEditor(event)">
    <div class="editor-modal" onclick="event.stopPropagation()">
        <div class="editor-toolbar">
            <div class="editor-title-area">
                <span id="editorBadge" class="card-subject" style="margin-bottom: 8px;">MATÉRIA</span>
                <h2 id="tituloEditor">Título do Resumo</h2>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-word-close" onclick="fecharEditor()">
                    <i class="fas fa-times"></i> Fechar
                </button>
                <button class="btn btn-word-save" onclick="salvar()">
                    <i class="fas fa-save"></i> Salvar Resumo
                </button>
            </div>
        </div>
        
        <div class="editor-body">
            <div class="word-page">
                <textarea id="conteudo" class="word-textarea" placeholder="Comece a digitar seu resumo detalhado aqui, como se estivesse no Word..."></textarea>
            </div>
        </div>

        <div class="editor-footer">
            <span style="color: #94a3b8; font-size: 0.85rem; display: flex; align-items: center; gap: 8px;">
                <i class="fas fa-info-circle"></i> Dica: O salvamento é automático no navegador, mas use "Backup" para o GitHub.
            </span>
        </div>
    </div>
</div>

<div id="toast" class="toast">Resumo atualizado com sucesso! ✨</div>

<script>
    /**
     * DATA STORAGE
     */
    let cards = [];
    let subjects = ["Geral", "Português", "Direito Administrativo", "Direito Constitucional", "Informática"];

    // Carregar dados iniciais
    function carregarDados() {
        const savedCards = localStorage.getItem('ciclo_cards_v3');
        const savedSubjects = localStorage.getItem('ciclo_subjects_v3');
        
        if (savedCards) cards = JSON.parse(savedCards);
        if (savedSubjects) subjects = JSON.parse(savedSubjects);
    }

    let indiceAtual = null;
    let materiaFiltro = "Todas";

    /**
     * SIDEBAR RENDER
     */
    function renderizarMaterias() {
        const list = document.getElementById('subject-list');
        const select = document.getElementById('selectMateria');
        
        list.innerHTML = `
            <div class="menu-item ${materiaFiltro === 'Todas' ? 'active' : ''}" onclick="filtrarMateria('Todas')">
                <span><i class="fas fa-layer-group"></i> Todas</span>
                <span class="subject-count">${cards.length}</span>
            </div>
        `;

        select.innerHTML = '';

        subjects.sort().forEach(sub => {
            const count = cards.filter(c => c.materia === sub).length;
            
            const item = document.createElement('div');
            item.className = `menu-item ${materiaFiltro === sub ? 'active' : ''}`;
            item.onclick = () => filtrarMateria(sub);
            
            // Adiciona o botão de excluir se não for a categoria 'Geral'
            const deleteBtn = sub !== 'Geral' ? `
                <button class="btn-delete-subject" onclick="excluirMateria(event, '${sub}')" title="Excluir Matéria">
                    <i class="fas fa-times-circle"></i>
                </button>
            ` : '';

            item.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-folder"></i>
                    <span>${sub}</span>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span class="subject-count">${count}</span>
                    ${deleteBtn}
                </div>
            `;
            list.appendChild(item);

            const opt = document.createElement('option');
            opt.value = sub;
            opt.textContent = sub;
            select.appendChild(opt);
        });
    }

    function filtrarMateria(sub) {
        materiaFiltro = sub;
        document.getElementById('current-subject-title').innerText = sub === 'Todas' ? 'Meus Resumos' : sub;
        renderizar();
        renderizarMaterias();
    }

    function adicionarMateria() {
        const nome = prompt("Qual o nome da nova matéria?");
        if (nome && !subjects.includes(nome)) {
            subjects.push(nome);
            salvarNoStorage();
            renderizarMaterias();
        }
    }

    /**
     * Exclui uma matéria e move os cards para 'Geral'
     */
    function excluirMateria(event, nome) {
        event.stopPropagation(); // Evita filtrar a matéria ao clicar no X
        
        if (nome === "Geral") return;

        const confirmacao = confirm(`Tem certeza que deseja excluir a matéria "${nome}"?\n\nOs resumos desta matéria NÃO serão apagados, eles serão movidos para a categoria "Geral".`);
        
        if (confirmacao) {
            // 1. Mover cards para 'Geral'
            cards.forEach(card => {
                if (card.materia === nome) {
                    card.materia = "Geral";
                }
            });

            // 2. Remover do array de matérias
            subjects = subjects.filter(s => s !== nome);

            // 3. Se o filtro atual era a matéria excluída, voltar para 'Todas'
            if (materiaFiltro === nome) {
                materiaFiltro = "Todas";
                document.getElementById('current-subject-title').innerText = 'Meus Resumos';
            }

            // 4. Salvar e atualizar
            salvarNoStorage();
            renderizar();
            renderizarMaterias();
            
            // Mostrar toast de feedback
            const toast = document.getElementById('toast');
            const originalText = toast.innerText;
            toast.innerText = `Matéria "${nome}" removida. Resumos movidos para Geral.`;
            toast.style.background = "var(--danger-color)";
            mostrarToast();
            
            // Resetar toast após exibição
            setTimeout(() => {
                toast.innerText = originalText;
                toast.style.background = "var(--success-color)";
            }, 3500);
        }
    }

    /**
     * GRID RENDER (FLASHCARDS)
     */
    function renderizar() {
        const grid = document.getElementById('grid');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        grid.innerHTML = '';

        const filteredCards = cards.filter(card => {
            const matchesSearch = card.titulo.toLowerCase().includes(searchTerm) || 
                                 (card.conteudo && card.conteudo.toLowerCase().includes(searchTerm));
            const matchesSubject = materiaFiltro === 'Todas' || card.materia === materiaFiltro;
            return matchesSearch && matchesSubject;
        });

        document.getElementById('stats-text').innerText = `${filteredCards.length} temas cadastrados em ${materiaFiltro}`;

        if (filteredCards.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-search fa-4x" style="opacity: 0.1; margin-bottom: 25px;"></i>
                    <p>Nenhum resumo encontrado para "${searchTerm}".</p>
                </div>
            `;
        } else {
            filteredCards.forEach((card) => {
                const realIndex = cards.findIndex(c => c === card);
                
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => abrir(realIndex);
                
                div.innerHTML = `
                    <div class="card-content">
                        <span class="card-subject">${card.materia || 'Geral'}</span>
                        <h3>${card.titulo}</h3>
                    </div>
                    <div class="card-footer">
                        <div class="card-info">
                            <i class="fas fa-align-left"></i>
                            <span>${card.conteudo ? card.conteudo.split(' ').length + ' palavras' : 'Sem conteúdo'}</span>
                        </div>
                        <div class="card-actions">
                            <button class="btn-icon-card" onclick="deletarCard(event, ${realIndex})" title="Excluir">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(div);
            });
        }
    }

    /**
     * CORE FUNCTIONS
     */
    function criarCard() {
        const tituloInput = document.getElementById('novoTitulo');
        const materiaSelect = document.getElementById('selectMateria');
        const titulo = tituloInput.value.trim();
        const materia = materiaSelect.value;
        
        if (!titulo) return;

        cards.unshift({ 
            titulo, 
            materia,
            conteudo: '',
            data: new Date().toISOString()
        });
        
        tituloInput.value = '';
        salvarNoStorage();
        renderizar();
        renderizarMaterias();
        
        // Abrir o editor automaticamente para o novo card
        abrir(0);
    }

    function abrir(index) {
        indiceAtual = index;
        const card = cards[index];
        
        document.getElementById('overlay').classList.add('active');
        document.getElementById('tituloEditor').innerText = card.titulo;
        document.getElementById('editorBadge').innerText = card.materia || 'Geral';
        document.getElementById('conteudo').value = card.conteudo || '';
        
        // Bloquear scroll do body
        document.body.style.overflow = 'hidden';
    }

    function fecharEditor(event) {
        document.getElementById('overlay').classList.remove('active');
        document.body.style.overflow = 'auto';
        indiceAtual = null;
    }

    function salvar() {
        if (indiceAtual === null) return;
        cards[indiceAtual].conteudo = document.getElementById('conteudo').value;
        salvarNoStorage();
        renderizar();
        mostrarToast();
    }

    function deletarCard(event, index) {
        event.stopPropagation();
        if (confirm('Tem certeza que deseja excluir este resumo? Esta ação não pode ser desfeita.')) {
            cards.splice(index, 1);
            salvarNoStorage();
            renderizar();
            renderizarMaterias();
        }
    }

    function salvarNoStorage() {
        localStorage.setItem('ciclo_cards_v3', JSON.stringify(cards));
        localStorage.setItem('ciclo_subjects_v3', JSON.stringify(subjects));
    }

    function mostrarToast() {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    /**
     * PERSISTENCE FOR GITHUB
     */
    function salvarParaArquivo() {
        const currentHtml = document.documentElement.outerHTML;
        
        const cardsRegex = /let cards = \[[\s\S]*?\];/;
        const subjectsRegex = /let subjects = \[[\s\S]*?\];/;
        
        let newHtml = currentHtml.replace(cardsRegex, `let cards = ${JSON.stringify(cards, null, 4)};`);
        newHtml = newHtml.replace(subjectsRegex, `let subjects = ${JSON.stringify(subjects, null, 4)};`);
        
        // Manter dados sincronizados no arquivo baixado
        newHtml = newHtml.replace(/carregarDados\(\);/, "// Dados embutidos\n        // carregarDados();");

        const blob = new Blob([newHtml], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'MeusResumos_Estudo.html';
        a.click();
        
        alert("Backup gerado! Substitua o arquivo no seu GitHub com este novo arquivo baixado.");
    }

    // Init
    carregarDados();
    renderizarMaterias();
    renderizar();
</script>

</body>
</html>
